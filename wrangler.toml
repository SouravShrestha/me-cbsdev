name = "cbsdev-prod"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_ENV = "PROD"

[env.test]
name = "cbsdev-test"

[env.test.vars]
NEXT_PUBLIC_ENV = "TEST"
